<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진실 혹은 거짓 · 수련회 OX 퀴즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#19130b; --gold:#e3b063; --gold-bright:#f8d693; --gold-dim:#9c7e4d;
    --ink:#f0e6cf; --ink-dim:#bdad8a; --ink-faint:#82745a; --line:#42361f;
    --o:#5db98a; --o-dark:#2c6b4d; --x:#d9694f; --x-dark:#8a3a2a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Gowun Dodum',sans-serif;color:var(--ink);min-height:100vh;
    overflow-x:hidden;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(227,176,99,.25), transparent 70%),
      linear-gradient(175deg,#221a0f,#19130b 55%,#120d07);
  }
  .stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .star{position:absolute;background:#f4e8c8;border-radius:50%;
    animation:tw 5s infinite;}
  @keyframes tw{0%,100%{opacity:.1}50%{opacity:.65}}
  .wrap{position:relative;z-index:2;max-width:920px;margin:0 auto;padding:50px 22px 90px;}

  /* ===== setup screen ===== */
  header{text-align:center;margin-bottom:38px;}
  .kicker{font-family:'Nanum Myeongjo',serif;letter-spacing:.4em;font-size:.74rem;
    color:var(--gold-dim);text-transform:uppercase;margin-bottom:18px;}
  h1{font-family:'Black Han Sans',sans-serif;font-size:3.1rem;letter-spacing:.02em;
    line-height:1.1;color:var(--ink);margin-bottom:10px;}
  h1 .o{color:var(--o);}h1 .x{color:var(--x);}
  .sub{color:var(--ink-dim);font-size:.98rem;}

  .panel{
    background:linear-gradient(180deg,rgba(44,35,21,.9),rgba(31,24,14,.9));
    border:1px solid var(--line);border-radius:7px;padding:30px 30px;
    margin-bottom:22px;box-shadow:0 16px 42px rgba(0,0,0,.45);
  }
  .panel-label{font-family:'Nanum Myeongjo',serif;letter-spacing:.2em;font-size:.74rem;
    color:var(--gold);margin-bottom:16px;}
  .lbl{font-size:.85rem;color:var(--ink-dim);margin-bottom:9px;}
  .opt-group{margin-bottom:20px;}
  .chips{display:flex;flex-wrap:wrap;gap:9px;}
  .chip{padding:9px 16px;border:1px solid var(--line);border-radius:28px;
    background:#181107;color:var(--ink-dim);cursor:pointer;font-size:.85rem;
    transition:all .2s;}
  .chip:hover{border-color:var(--gold-dim);}
  .chip.sel{background:linear-gradient(180deg,var(--gold-bright),var(--gold));
    color:#241a0a;border-color:var(--gold);font-weight:bold;}

  .btn{display:block;width:100%;padding:17px;margin-top:6px;
    background:linear-gradient(180deg,var(--gold-bright),var(--gold));
    color:#241a0a;border:none;border-radius:6px;cursor:pointer;
    font-family:'Black Han Sans',sans-serif;font-size:1.15rem;letter-spacing:.08em;
    transition:transform .2s,box-shadow .2s;}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(227,176,99,.34);}
  .btn.ghost{background:none;border:1px solid var(--gold-dim);color:var(--gold);
    font-family:'Gowun Dodum',sans-serif;font-size:.92rem;}
  .btn.ghost:hover{background:rgba(227,176,99,.08);box-shadow:none;}

  /* ===== quiz / play screen ===== */
  #play{display:none;}
  .stage{
    background:linear-gradient(180deg,rgba(40,32,19,.95),rgba(26,20,12,.95));
    border:1px solid var(--line);border-radius:10px;
    padding:48px 44px;text-align:center;min-height:440px;
    display:flex;flex-direction:column;justify-content:center;
    box-shadow:0 24px 60px rgba(0,0,0,.55);position:relative;
  }
  .progress{position:absolute;top:18px;left:0;right:0;
    font-family:'Nanum Myeongjo',serif;letter-spacing:.24em;font-size:.78rem;
    color:var(--gold-dim);}
  .qcat{display:inline-block;font-size:.74rem;background:#3a2f1a;color:var(--gold);
    padding:5px 15px;border-radius:20px;letter-spacing:.06em;margin-bottom:22px;}
  .qtext{font-family:'Nanum Myeongjo',serif;font-weight:800;
    font-size:1.95rem;line-height:1.55;color:var(--ink);margin-bottom:36px;}
  .ox-row{display:flex;gap:22px;justify-content:center;}
  .ox-btn{
    width:150px;height:150px;border-radius:18px;border:3px solid;
    font-family:'Black Han Sans',sans-serif;font-size:4.5rem;cursor:pointer;
    transition:transform .15s,box-shadow .2s;background:#181107;
  }
  .ox-btn.O{color:var(--o);border-color:var(--o-dark);}
  .ox-btn.X{color:var(--x);border-color:var(--x-dark);}
  .ox-btn:hover{transform:scale(1.06);}
  .ox-btn.O:hover{box-shadow:0 0 36px rgba(93,185,138,.4);}
  .ox-btn.X:hover{box-shadow:0 0 36px rgba(217,105,79,.4);}
  .ox-btn:disabled{cursor:default;opacity:.35;}
  .ox-btn.correct{opacity:1;box-shadow:0 0 44px currentColor;transform:scale(1.08);}
  .ox-btn.wrong{opacity:.3;}

  .reveal{margin-top:30px;display:none;}
  .reveal .verdict{font-family:'Black Han Sans',sans-serif;font-size:2rem;
    margin-bottom:10px;}
  .reveal .verdict.ok{color:var(--o);}
  .reveal .verdict.no{color:var(--x);}
  .reveal .explain{color:var(--ink-dim);font-size:1rem;line-height:1.75;
    max-width:560px;margin:0 auto;}
  .reveal .ref{color:var(--gold-dim);font-size:.84rem;margin-top:8px;
    font-style:italic;}

  .controls{display:flex;gap:12px;margin-top:24px;}
  .controls .btn{margin-top:0;}

  /* score screen */
  #result{display:none;text-align:center;}
  .res-card{background:linear-gradient(180deg,rgba(40,32,19,.95),rgba(26,20,12,.95));
    border:1px solid var(--line);border-radius:10px;padding:54px 40px;
    box-shadow:0 24px 60px rgba(0,0,0,.55);}
  .res-sun{width:88px;height:88px;margin:0 auto 22px;border-radius:50%;
    background:radial-gradient(circle,#f8d693,#e3b063 50%,transparent 74%);
    box-shadow:0 0 60px 18px rgba(227,176,99,.4);}
  .res-score{font-family:'Black Han Sans',sans-serif;font-size:4rem;
    color:var(--gold-bright);line-height:1;}
  .res-score small{font-size:1.4rem;color:var(--ink-faint);}
  .res-msg{font-family:'Nanum Myeongjo',serif;font-size:1.25rem;color:var(--ink);
    margin:18px 0 8px;}
  .res-sub{color:var(--ink-dim);font-size:.95rem;}

  /* print sheet */
  #sheet{display:none;}

  @media(max-width:620px){
    h1{font-size:2.2rem;}.wrap{padding:36px 14px 70px;}
    .stage{padding:34px 20px;min-height:380px;}
    .qtext{font-size:1.4rem;}
    .ox-btn{width:118px;height:118px;font-size:3.4rem;}
    .panel{padding:22px 18px;}
  }
  @media print{
    body{background:#fff;color:#000;}
    .stars,header,.panel,#play,#result{display:none!important;}
    #sheet{display:block!important;}
  }
  /* printable answer key */
  .ps-q{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #ccc;
    color:#000;}
  .ps-q .n{font-weight:bold;}
  .ps-a{color:#1a6b3f;font-weight:bold;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="wrap">

  <!-- ===== SETUP ===== -->
  <div id="setup">
    <header>
      <div class="kicker">Truth or False · 진실을 마주하라</div>
      <h1>진실 <span class="o">O</span> 혹은 거짓 <span class="x">X</span></h1>
      <p class="sub">수련회 OX 퀴즈 생성기 — 하나님 나라, 하나님의 방식으로</p>
    </header>

    <div class="panel">
      <div class="panel-label">◇  퀴즈 설정</div>
      <div class="opt-group">
        <div class="lbl">주제 범위 (복수 선택 가능)</div>
        <div class="chips" id="g_cat"></div>
      </div>
      <div class="opt-group">
        <div class="lbl">난이도</div>
        <div class="chips" id="g_diff"></div>
      </div>
      <div class="opt-group">
        <div class="lbl">문항 수</div>
        <div class="chips" id="g_count"></div>
      </div>
      <button class="btn" onclick="start()">▶  퀴즈 시작하기</button>
      <button class="btn ghost" onclick="printSheet()" style="margin-top:10px;">⎙  문제지 · 정답지로 인쇄하기</button>
    </div>
  </div>

  <!-- ===== PLAY ===== -->
  <div id="play">
    <div class="stage">
      <div class="progress" id="prog"></div>
      <div class="qcat" id="qcat"></div>
      <div class="qtext" id="qtext"></div>
      <div class="ox-row">
        <button class="ox-btn O" id="btnO" onclick="answer(true)">O</button>
        <button class="ox-btn X" id="btnX" onclick="answer(false)">X</button>
      </div>
      <div class="reveal" id="reveal">
        <div class="verdict" id="verdict"></div>
        <div class="explain" id="explain"></div>
        <div class="ref" id="ref"></div>
      </div>
    </div>
    <div class="controls">
      <button class="btn" id="nextBtn" onclick="next()" style="display:none;">다음 문제 ▶</button>
    </div>
  </div>

  <!-- ===== RESULT ===== -->
  <div id="result">
    <div class="res-card">
      <div class="res-sun"></div>
      <div class="res-score" id="finalScore"></div>
      <div class="res-msg" id="finalMsg"></div>
      <div class="res-sub" id="finalSub"></div>
      <button class="btn" onclick="location.reload()" style="margin-top:30px;">↻  새 퀴즈 만들기</button>
    </div>
  </div>

  <!-- printable -->
  <div id="sheet"></div>

</div>

<script>
const sc=document.getElementById('stars');
for(let i=0;i<32;i++){const s=document.createElement('div');s.className='star';
  const z=Math.random()*2+1;s.style.width=z+'px';s.style.height=z+'px';
  s.style.left=Math.random()*100+'%';s.style.top=Math.random()*70+'%';
  s.style.animationDelay=Math.random()*5+'s';sc.appendChild(s);}

/* ===== question bank — built on the curriculum ===== */
/* a:true => 정답은 O, a:false => 정답은 X */
const BANK=[
 // 1일차 — 세계관 / 절대주권 / 다니엘
 {cat:'1일차 · 세계관',d:'easy',q:'수련회 주제는 "하나님 나라, 하나님의 방식으로" 이다.',a:true,
  e:'맞습니다. 로마서 12장 2절을 본문으로 한 이번 수련회의 주제입니다.',r:'로마서 12:2'},
 {cat:'1일차 · 절대주권',d:'easy',q:'개혁주의 신학은 우리 인생에 "우연"이 존재한다고 가르친다.',a:false,
  e:'아닙니다. 하나님의 절대주권 — 우연은 없으며 모든 것이 하나님의 계획 안에 있습니다.',r:'잠언 16:9'},
 {cat:'1일차 · 다니엘',d:'easy',q:'다니엘은 바벨론의 방식을 거절하고 하나님의 방식을 선택했다.',a:true,
  e:'맞습니다. 다니엘 1장에서 다니엘은 왕의 음식을 거절하고 하나님의 방식으로 살아 진짜 승리를 거두었습니다.',r:'다니엘 1장'},
 {cat:'1일차 · 세계관',d:'mid',q:'성경은 성적·외모·인기·돈이 사람을 판단하는 정당한 기준이라고 말한다.',a:false,
  e:'아닙니다. 시편 24편은 모든 것의 주인이 여호와이시며, 세상의 기준은 하나님 앞에서 의미가 없다고 말합니다.',r:'시편 24편'},
 {cat:'1일차 · 절대주권',d:'mid',q:'"하나님의 절대주권(Total Sovereignty)"은 하나님이 모든 것을 다스리신다는 뜻이다.',a:true,
  e:'맞습니다. 우연은 없고, 모든 것이 하나님의 계획과 다스림 안에 있다는 개혁주의의 핵심 교리입니다.',r:'개혁주의 4기둥'},

 // 2일차 — 전적 타락 / 전도서 / 십자가 / 부활
 {cat:'2일차 · 전적 타락',d:'mid',q:'"전적 타락"은 인간이 할 수 있는 한 가장 악하다는 뜻이다.',a:false,
  e:"아닙니다. '완전히 나쁘다'는 뜻이 아니라, 죄가 인간의 모든 영역(이성·감정·의지·관계)에 영향을 미친다는 뜻입니다.",r:'개혁주의 교리'},
 {cat:'2일차 · 전도서',d:'easy',q:"솔로몬은 세상의 모든 방식을 시도한 뒤 '헛되고 헛되다'고 고백했다.",a:true,
  e:'맞습니다. 전도서 1~2장에서 솔로몬은 세상의 방식이 결국 공허하다는 것을 고백합니다.',r:'전도서 1~2장'},
 {cat:'2일차 · 십자가',d:'mid',q:'십자가는 세상이 보기에 가장 큰 패배처럼 보였지만 실제로는 가장 큰 승리였다.',a:true,
  e:'맞습니다. 고린도전서 1장 18~25절 — 세상이 미련하게 여기는 십자가가 하나님의 능력입니다.',r:'고린도전서 1:18~25'},
 {cat:'2일차 · 복음',d:'mid',q:'복음의 승리 공식은 "강한 자가 이긴다"이다.',a:false,
  e:'아닙니다. 그것은 세상의 공식입니다. 복음은 약함으로 강함을 이기고, 내어줌으로 얻고, 죽음으로 생명을 이깁니다.',r:'고린도전서 1장'},
 {cat:'2일차 · 부활',d:'hard',q:'부활은 하나님의 방식이 반드시 이긴다는 보증이다.',a:true,
  e:'맞습니다. 부활은 죽음과 절망이라는 세상의 방식에 대한 하나님의 최종 답변입니다.',r:'고린도전서 15장'},

 // 3일차 — 성화 / 파송
 {cat:'3일차 · 성화',d:'mid',q:'성화는 한 번에 완벽해지는 사건이다.',a:false,
  e:'아닙니다. 성화는 단번에 완벽해지는 것이 아니라, 날마다 하나님의 방식을 선택하는 훈련의 과정입니다.',r:'빌립보서 1:6'},
 {cat:'3일차 · 성화',d:'easy',q:'성화의 세 가지 훈련은 말씀 묵상, 기도, 공동체이다.',a:true,
  e:'맞습니다. 하나님의 방식으로 생각하고, 하나님의 능력을 의지하며, 함께 살아가는 훈련입니다.',r:'교리 강의 4'},
 {cat:'3일차 · 성화',d:'hard',q:'성화에서 한 번 넘어지면 다시 돌이킬 수 없다.',a:false,
  e:'아닙니다. 성화는 완벽함이 아니라 방향입니다. 넘어져도 다시 일어나 하나님의 방식으로 돌아오면 됩니다.',r:'잠언 24:16'},
 {cat:'3일차 · 파송',d:'mid',q:'우리는 수련회를 마치고 하나님 나라의 시민으로서 세상 속으로 파송받는다.',a:true,
  e:'맞습니다. 수련회는 끝이 아니라 진짜 시작 — 세상 속으로의 파송입니다.',r:'마태복음 28:19~20'},

 // 일반 성경 상식
 {cat:'성경 상식',d:'easy',q:'요셉은 형들에게 팔려 애굽으로 내려갔다.',a:true,
  e:'맞습니다. 창세기 37장의 사건이며, 후에 하나님의 섭리로 한 민족을 살리는 자리에 서게 됩니다.',r:'창세기 37장'},
 {cat:'성경 상식',d:'easy',q:'로마서는 신약성경의 책이다.',a:true,
  e:'맞습니다. 사도 바울이 로마 교회에 보낸 편지입니다.',r:'신약성경'},
 {cat:'성경 상식',d:'mid',q:'전도서를 쓴 사람으로 전통적으로 알려진 인물은 다윗이다.',a:false,
  e:'아닙니다. 전도서는 전통적으로 솔로몬이 쓴 것으로 알려져 있습니다.',r:'전도서'},
 {cat:'성경 상식',d:'hard',q:'"너희는 이 세대를 본받지 말라"는 말씀은 로마서 12장에 나온다.',a:true,
  e:'맞습니다. 로마서 12장 2절 — 이번 수련회의 핵심 본문입니다.',r:'로마서 12:2'},
];

const CATS=[...new Set(BANK.map(x=>x.cat))];
const OPTS={
  diff:[['쉬움 위주','easy'],['보통','mid'],['어려움 포함','hard'],['전체 난이도','all']],
  count:[['5문항','5'],['8문항','8'],['12문항','12'],['전체','99']]
};
const state={cats:new Set(CATS),diff:'all',count:'8'};

// category chips (multi)
const catEl=document.getElementById('g_cat');
CATS.forEach(c=>{
  const ch=document.createElement('div');ch.className='chip sel';ch.textContent=c;
  ch.onclick=()=>{
    if(state.cats.has(c)){state.cats.delete(c);ch.classList.remove('sel');}
    else{state.cats.add(c);ch.classList.add('sel');}
  };
  catEl.appendChild(ch);
});
function buildSingle(key,elId){
  const el=document.getElementById(elId);
  OPTS[key].forEach(([label,val])=>{
    const ch=document.createElement('div');ch.className='chip';ch.textContent=label;
    if(state[key]===val)ch.classList.add('sel');
    ch.onclick=()=>{state[key]=val;
      [...el.children].forEach(c=>c.classList.remove('sel'));ch.classList.add('sel');};
    el.appendChild(ch);
  });
}
buildSingle('diff','g_diff');
buildSingle('count','g_count');

function buildQuiz(){
  let pool=BANK.filter(q=>state.cats.has(q.cat));
  if(state.diff!=='all'){
    const allow={easy:['easy'],mid:['easy','mid'],hard:['easy','mid','hard']}[state.diff];
    pool=pool.filter(q=>allow.includes(q.d));
  }
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];}
  const n=Math.min(parseInt(state.count),pool.length);
  return pool.slice(0,n);
}

let quiz=[],idx=0,score=0,answered=false;

function start(){
  if(state.cats.size===0){alert('주제를 하나 이상 선택해 주세요.');return;}
  quiz=buildQuiz();
  if(quiz.length===0){alert('조건에 맞는 문제가 없습니다. 설정을 바꿔 주세요.');return;}
  idx=0;score=0;
  document.getElementById('setup').style.display='none';
  document.getElementById('play').style.display='block';
  render();
}

function render(){
  answered=false;
  const q=quiz[idx];
  document.getElementById('prog').textContent=`문제 ${idx+1} / ${quiz.length}`;
  document.getElementById('qcat').textContent=q.cat;
  document.getElementById('qtext').textContent=q.q;
  ['btnO','btnX'].forEach(id=>{
    const b=document.getElementById(id);
    b.disabled=false;b.className='ox-btn '+id.slice(3);
  });
  document.getElementById('reveal').style.display='none';
  document.getElementById('nextBtn').style.display='none';
}

function answer(chose){
  if(answered)return;answered=true;
  const q=quiz[idx];
  const correct=(chose===q.a);
  if(correct)score++;
  document.getElementById('btnO').disabled=true;
  document.getElementById('btnX').disabled=true;
  const rightId=q.a?'btnO':'btnX';
  const choseId=chose?'btnO':'btnX';
  document.getElementById(rightId).classList.add('correct');
  if(!correct)document.getElementById(choseId).classList.add('wrong');

  const rv=document.getElementById('reveal');
  rv.style.display='block';
  const vd=document.getElementById('verdict');
  vd.textContent=correct?'정답입니다!':'아쉬워요!';
  vd.className='verdict '+(correct?'ok':'no');
  document.getElementById('explain').textContent=
    `정답은 [ ${q.a?'O':'X'} ] — `+q.e;
  document.getElementById('ref').textContent='관련 본문 · '+q.r;
  document.getElementById('nextBtn').style.display='block';
  document.getElementById('nextBtn').textContent=
    (idx+1<quiz.length)?'다음 문제 ▶':'결과 보기 ▶';
}

function next(){
  idx++;
  if(idx<quiz.length){render();}
  else{showResult();}
}

function showResult(){
  document.getElementById('play').style.display='none';
  const r=document.getElementById('result');r.style.display='block';
  const pct=Math.round(score/quiz.length*100);
  document.getElementById('finalScore').innerHTML=
    `${score}<small> / ${quiz.length}</small>`;
  let msg,sub;
  if(pct>=90){msg='하나님의 방식을 잘 알고 있습니다!';sub='이제 그 진리를 삶으로 살아낼 차례입니다.';}
  else if(pct>=60){msg='잘 따라오고 있어요.';sub='놓친 진리는 다시 한 번 마음에 새겨 보세요.';}
  else{msg='숨겨진 X를 더 찾아봅시다.';sub='교리 강의를 다시 떠올리며 함께 이야기 나눠 보세요.';}
  document.getElementById('finalMsg').textContent=msg;
  document.getElementById('finalSub').textContent=sub;
  r.scrollIntoView({behavior:'smooth'});
}

/* printable problem + answer sheet */
function printSheet(){
  if(state.cats.size===0){alert('주제를 하나 이상 선택해 주세요.');return;}
  const q=buildQuiz();
  if(q.length===0){alert('조건에 맞는 문제가 없습니다.');return;}
  let html=`<h2 style="font-family:'Nanum Myeongjo',serif;text-align:center;color:#000;">
      수련회 OX 퀴즈 — 진실 혹은 거짓</h2>
    <p style="text-align:center;color:#555;">하나님 나라, 하나님의 방식으로 · 총 ${q.length}문항</p>
    <hr><h3 style="color:#000;">■ 문제</h3>`;
  q.forEach((x,i)=>{
    html+=`<div class="ps-q"><span class="n">${i+1}.</span> [ ${x.cat} ] ${x.q}
      &nbsp;&nbsp;( O / X )</div>`;
  });
  html+=`<div style="page-break-before:always;"></div><h3 style="color:#000;">■ 정답 및 해설</h3>`;
  q.forEach((x,i)=>{
    html+=`<div class="ps-q"><span class="n">${i+1}.</span>
      <span class="ps-a">정답: ${x.a?'O':'X'}</span> — ${x.e}
      <br><span style="color:#888;font-size:.85em;">관련 본문: ${x.r}</span></div>`;
  });
  const sheet=document.getElementById('sheet');
  sheet.innerHTML=html;
  window.print();
}
</script>
